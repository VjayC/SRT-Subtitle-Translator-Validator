name: Release App

on:
  push:
    tags:
      - 'v*' # This triggers the build ONLY when you push a tag like "v1.3.0"

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Mac Universal (Apple Silicon + Intel)
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          
          # 2. Windows Standard (Intel / AMD)
          - platform: 'windows-latest'
            args: ''
            
          # 3. Windows ARM (Snapdragon Copilot+ PCs)
          - platform: 'windows-latest'
            args: '--target aarch64-pc-windows-msvc'
            
          # 4. Linux (Ubuntu)
          - platform: 'ubuntu-24.04'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Install Linux Dependencies (Only runs on Ubuntu)
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # 2. Setup Java & Build Backend
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Build Spring Boot Backend
        working-directory: ./app/backend
        shell: bash
        run: |
          chmod +x mvnw || true
          ./mvnw clean package -DskipTests
          
      - name: Move JAR to Tauri Binaries
        shell: bash
        run: |
          mkdir -p ./app/frontend/src-tauri/binaries
          cp ./app/backend/target/*.jar ./app/frontend/src-tauri/binaries/backend-0.0.1-SNAPSHOT.jar

      # 3. Setup Node & Rust for Tauri
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        working-directory: ./app/frontend
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.platform == 'windows-latest' && 'aarch64-pc-windows-msvc' || '' }}

      # 4. Build Tauri App
      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: ./app/frontend
          tagName: ${{ github.ref_name }} # e.g., v1.3.0
          releaseName: 'SRT Translator & Validator ${{ github.ref_name }}'
          releaseBody: 'A new update is available! Please see the GitHub release page for the full changelog and details.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}