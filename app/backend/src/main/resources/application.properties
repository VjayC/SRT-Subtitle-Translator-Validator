# Run the Spring Boot backend on a different port than your React dev server
server.port=8080

# H2 Database Configuration (File-based storage)
# Removed the unsupported flags. This will safely store your data in your user directory.
spring.datasource.url=jdbc:h2:file:~/.srt-translator/srt_translator_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Enable H2 Console for debugging (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true